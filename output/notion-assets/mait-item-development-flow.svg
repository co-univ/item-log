<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">MAIT 아이템 개발 플로우</title>
  <desc id="desc">초안등록부터 배포 후 확인까지 MAIT 제품 아이템이 개발되는 권장 흐름</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 42px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 20px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; }
      .stage-label { font: 800 22px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; }
      .step-title { font: 800 20px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; }
      .step-sub { font: 500 15px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; }
      .note { font: 700 17px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #334155; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .arrow { stroke: #64748b; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrowHead); }
      .band1 { fill: #dbeafe; }
      .band2 { fill: #dcfce7; }
      .band3 { fill: #fef3c7; }
      .band4 { fill: #ede9fe; }
      .band5 { fill: #fce7f3; }
      .band6 { fill: #e0f2fe; }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="560"/>

  <text class="title" x="64" y="72">MAIT 아이템 개발 플로우</text>
  <text class="subtitle" x="64" y="106">초안은 아이디어, 개발확정부터 팀의 약속으로 관리한다.</text>

  <g transform="translate(64 150)">
    <rect class="band1" x="0" y="0" width="226" height="290" rx="18"/>
    <rect class="band2" x="246" y="0" width="226" height="290" rx="18"/>
    <rect class="band3" x="492" y="0" width="226" height="290" rx="18"/>
    <rect class="band4" x="738" y="0" width="226" height="290" rx="18"/>
    <rect class="band5" x="984" y="0" width="226" height="290" rx="18"/>
    <rect class="band6" x="1230" y="0" width="226" height="290" rx="18"/>

    <text class="stage-label" x="24" y="42">1. 후보화</text>
    <text class="stage-label" x="270" y="42">2. 제품화</text>
    <text class="stage-label" x="516" y="42">3. 설계 확정</text>
    <text class="stage-label" x="762" y="42">4. 개발 준비</text>
    <text class="stage-label" x="1008" y="42">5. 실행</text>
    <text class="stage-label" x="1254" y="42">6. 릴리스</text>

    <g transform="translate(24 72)">
      <rect class="card" x="0" y="0" width="178" height="82" rx="12"/>
      <text class="step-title" x="18" y="33">초안등록</text>
      <text class="step-sub" x="18" y="58">아이디어 / 문의 / 회의</text>
      <rect class="card" x="0" y="118" width="178" height="82" rx="12"/>
      <text class="step-title" x="18" y="151">개발후보 검토</text>
      <text class="step-sub" x="18" y="176">우선순위와 필요성 판단</text>
    </g>

    <g transform="translate(270 72)">
      <rect class="card" x="0" y="0" width="178" height="82" rx="12"/>
      <text class="step-title" x="18" y="33">개발확정</text>
      <text class="step-sub" x="18" y="58">팀의 개발 약속</text>
      <rect class="card" x="0" y="118" width="178" height="82" rx="12"/>
      <text class="step-title" x="18" y="151">MAIT-PM 에픽</text>
      <text class="step-sub" x="18" y="176">제품 아이템 등록</text>
    </g>

    <g transform="translate(516 72)">
      <rect class="card" x="0" y="0" width="178" height="82" rx="12"/>
      <text class="step-title" x="18" y="33">기획 확정</text>
      <text class="step-sub" x="18" y="58">명세 / 플로우 / 기준</text>
      <rect class="card" x="0" y="118" width="178" height="82" rx="12"/>
      <text class="step-title" x="18" y="151">디자인 확정</text>
      <text class="step-sub" x="18" y="176">Figma / 상태 / 반응형</text>
    </g>

    <g transform="translate(762 72)">
      <rect class="card" x="0" y="0" width="178" height="82" rx="12"/>
      <text class="step-title" x="18" y="33">개발 준비 완료</text>
      <text class="step-sub" x="18" y="58">API / 담당자 / 범위</text>
      <rect class="card" x="0" y="118" width="178" height="82" rx="12"/>
      <text class="step-title" x="18" y="151">EDU 티켓 생성</text>
      <text class="step-sub" x="18" y="176">실제 작업 단위</text>
    </g>

    <g transform="translate(1008 72)">
      <rect class="card" x="0" y="0" width="178" height="82" rx="12"/>
      <text class="step-title" x="18" y="33">개발 / 리뷰</text>
      <text class="step-sub" x="18" y="58">PR 기준 진행</text>
      <rect class="card" x="0" y="118" width="178" height="82" rx="12"/>
      <text class="step-title" x="18" y="151">QA</text>
      <text class="step-sub" x="18" y="176">시나리오 기반 검증</text>
    </g>

    <g transform="translate(1254 72)">
      <rect class="card" x="0" y="0" width="178" height="82" rx="12"/>
      <text class="step-title" x="18" y="33">배포 준비</text>
      <text class="step-sub" x="18" y="58">fixVersion / 체크</text>
      <rect class="card" x="0" y="118" width="178" height="82" rx="12"/>
      <text class="step-title" x="18" y="151">배포 후 확인</text>
      <text class="step-sub" x="18" y="176">smoke test / 기록</text>
    </g>

    <path class="arrow" d="M210 145 H252"/>
    <path class="arrow" d="M456 145 H498"/>
    <path class="arrow" d="M702 145 H744"/>
    <path class="arrow" d="M948 145 H990"/>
    <path class="arrow" d="M1194 145 H1236"/>
  </g>

  <rect x="64" y="476" width="1456" height="48" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="note" x="92" y="507">핵심 룰: 개발은 “디자인 확정” 직후가 아니라 “개발 준비 완료” 게이트를 통과한 뒤 시작한다.</text>
</svg>
