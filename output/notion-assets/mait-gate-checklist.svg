<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">MAIT 게이트 체크리스트</title>
  <desc id="desc">개발확정, 개발 준비 완료, 배포 준비 단계에서 확인해야 하는 핵심 게이트 체크리스트</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 42px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 20px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .head1 { fill: #dbeafe; }
      .head2 { fill: #fef3c7; }
      .head3 { fill: #dcfce7; }
      .card-title { font: 800 28px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; }
      .card-sub { font: 700 16px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; }
      .item { font: 600 20px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #334155; }
      .check { fill: #16a34a; }
      .warn { fill: #f97316; }
      .rule { font: 800 22px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="760"/>
  <text class="title" x="64" y="76">단계별 게이트 체크리스트</text>
  <text class="subtitle" x="64" y="110">다음 단계로 넘기기 전에 반드시 확인할 최소 조건만 남겼다.</text>

  <g transform="translate(64 160)">
    <rect class="card" x="0" y="0" width="456" height="480" rx="22"/>
    <rect class="head1" x="0" y="0" width="456" height="104" rx="22"/>
    <text class="card-title" x="32" y="46">개발확정 게이트</text>
    <text class="card-sub" x="32" y="76">초안에서 팀의 약속으로 넘어가는 순간</text>

    <circle class="check" cx="46" cy="150" r="10"/>
    <text class="item" x="70" y="157">문제/아이디어가 한 문장으로 설명됨</text>
    <circle class="check" cx="46" cy="210" r="10"/>
    <text class="item" x="70" y="217">출처가 연결됨</text>
    <text class="item" x="70" y="245">회의록 / Discord / 사용자 문의</text>
    <circle class="check" cx="46" cy="306" r="10"/>
    <text class="item" x="70" y="313">왜 지금 해야 하는지 결정됨</text>
    <circle class="check" cx="46" cy="366" r="10"/>
    <text class="item" x="70" y="373">담당 PM과 목표 배포 후보가 있음</text>
  </g>

  <g transform="translate(572 160)">
    <rect class="card" x="0" y="0" width="456" height="480" rx="22"/>
    <rect class="head2" x="0" y="0" width="456" height="104" rx="22"/>
    <text class="card-title" x="32" y="46">개발 준비 완료 게이트</text>
    <text class="card-sub" x="32" y="76">디자인 확정 직후 바로 개발하지 않기</text>

    <circle class="check" cx="46" cy="150" r="10"/>
    <text class="item" x="70" y="157">기능명세가 최신임</text>
    <circle class="check" cx="46" cy="210" r="10"/>
    <text class="item" x="70" y="217">와이어프레임 / flow chart가 있음</text>
    <circle class="check" cx="46" cy="270" r="10"/>
    <text class="item" x="70" y="277">Figma가 개발 가능 상태임</text>
    <text class="item" x="70" y="305">empty / loading / error 포함</text>
    <circle class="check" cx="46" cy="366" r="10"/>
    <text class="item" x="70" y="373">EDU 티켓과 API 기준이 있음</text>
  </g>

  <g transform="translate(1080 160)">
    <rect class="card" x="0" y="0" width="456" height="480" rx="22"/>
    <rect class="head3" x="0" y="0" width="456" height="104" rx="22"/>
    <text class="card-title" x="32" y="46">배포 준비 게이트</text>
    <text class="card-sub" x="32" y="76">QA 없이 배포 준비로 넘기지 않기</text>

    <circle class="check" cx="46" cy="150" r="10"/>
    <text class="item" x="70" y="157">PR 리뷰와 merge 기준 확인</text>
    <circle class="check" cx="46" cy="210" r="10"/>
    <text class="item" x="70" y="217">QA 시나리오 통과</text>
    <circle class="check" cx="46" cy="270" r="10"/>
    <text class="item" x="70" y="277">known issue와 필수 수정 구분</text>
    <circle class="check" cx="46" cy="330" r="10"/>
    <text class="item" x="70" y="337">fixVersion / 릴리스 기록 정리</text>
    <circle class="check" cx="46" cy="390" r="10"/>
    <text class="item" x="70" y="397">배포 후 smoke test 계획</text>
  </g>

  <rect x="64" y="684" width="1472" height="44" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="rule" x="92" y="714">가장 먼저 보강할 것: QA 체크리스트 없이는 MAIT-PM 이슈를 배포 준비로 옮기지 않는다.</text>
</svg>
